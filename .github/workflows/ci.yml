name: HiveFS CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.1' # Adjusted to match go.mod

    - name: Verify dependencies
      run: go mod verify

    - name: Build
      run: make build
      
    - name: Run Tests
      run: make test

  docker-check:
    runs-on: ubuntu-latest
    needs: test-and-lint
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker Image
      run: docker build -t hivefs-node .
