apiVersion: v1
kind: Service
metadata:
  name: hivefs-headless
  labels:
    app: hivefs
spec:
  # This makes it a Headless Service. 
  # It gives each pod a stable DNS name instead of load balancing across them.
  clusterIP: None
  selector:
    app: hivefs
  ports:
    - name: p2p
      port: 3000
      targetPort: 3000
